name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Test mini_data_pipeline
        env:
          SPARK_VERSION: '3.5'
        run: |
          cd mini_data_pipeline && pip install -r requirements.txt pytest && python -m pytest tests/ -v
      - name: Test unstructured-data-pipeline
        run: |
          cd unstructured-data-pipeline && python -m pytest tests/ -v
